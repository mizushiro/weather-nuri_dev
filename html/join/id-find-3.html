 <!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no" />

  <title>아이디 찾기</title>

  <link rel="stylesheet" href="../../resources/css/ui.base.css">
</head>

<body data-content-bg="F7F8FB">
<div class="base-wrap sub-content-layout" data-type="sub4">
  <!-- /html/header.html -->
  <header class="header" data-id="header"></header>

  <main class="join-area" data-type="id-pw">
    <div class="join-content-box" data-h="400">
      <div class="id-pw-type-2">
        <div class="ui-flex" data-align-items="center" data-justify-content="center">
          <div class="icon-round-box" data-bg="light-gray" data-size="78">
            <i class="icon-aspect-exclamation" data-size="24"></i>
          </div>
        </div>
        <p class="text-20-800 m-text-15-800 mt-30" data-text-color="black" data-text-align="center">
          입력하신 정보와 일치하는 아이디가 없습니다.
        </p>
        <div class="ui-flex mt-16" data-align-items="center" data-justify-content="center">
          <a href="" class="link-blue-line text-16-800">회원가입</a>
        </div>
        <div class="join-btn-group mt-68">
          <button type="button" class="btn-base" data-size="46" data-color="gray2" data-round="4">
            <span class="btn-text" data-font-size="16-800">메인으로</span>
          </button>
          <button type="button" class="btn-base" data-size="46" data-color="primary" data-round="4">
            <span class="btn-text" data-font-size="16-800">아이디 찾기</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="ui-footer" data-id="footer"></footer>


</div>

<div class="area-dropdown" data-area="body"></div>
<div class="area-tooltip" data-area="body"></div>
<div class="area-dialog" data-area="body"></div>
<div class="area-toast" data-area="body"></div>
<!-- javascript -->
<script type="module">
  /* 준비 ---------------------------------------------- */
  import { UX } from '../../resources/js/uiuxu.common.js';
  UX.init();

</script>
</body>
</html>
