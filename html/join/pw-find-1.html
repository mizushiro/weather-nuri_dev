 <!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no" />

  <title>비밀번호 찾기</title>

  <link rel="stylesheet" href="../../resources/css/ui.base.css">
</head>

<body data-content-bg="F7F8FB">
<div class="base-wrap sub-content-layout" data-type="sub4">
  <!-- /html/header.html -->
  <header class="header" data-id="header"></header>

  <main class="join-area" data-type="id-pw">
    <div class="join-content-box" data-h="400">
      <div class="id-pw-type">
        <h1 class="text-32-800 m-text-22-800" data-text-color="black" data-text-align="center">비밀번호 찾기</h1>
        <p class="mt-46 text-14-800" data-text-color="black" data-text-align="center">비밀번호를 찾으려는 아이디를 입력해주세요.</p>

        <div class="mt-20">
          <input type="text" class="form-element-input" data-width="full" data-size="46" placeholder="아이디" />
        </div>

        <div class="join-btn-group mt-58">
          <button type="button" class="btn-base" data-size="46" data-color="gray2" data-round="4">
            <span class="btn-text" data-font-size="16-800">취소</span>
          </button>
          <button type="button" class="btn-base" data-size="46" data-color="primary" data-round="4">
            <span class="btn-text" data-font-size="16-800">다음</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <footer class="ui-footer" data-id="footer"></footer>


</div>

<div class="area-dropdown" data-area="body"></div>
<div class="area-tooltip" data-area="body"></div>
<div class="area-dialog" data-area="body"></div>
<div class="area-toast" data-area="body"></div>
<!-- javascript -->
<script type="module">
  /* 준비 ---------------------------------------------- */
  import { UX } from '../../resources/js/uiuxu.common.js';
  UX.init();

</script>
</body>
</html>
